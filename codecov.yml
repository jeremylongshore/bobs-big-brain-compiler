# Codecov configuration for intentional-cognition-os.
#
# Reference: https://docs.codecov.com/docs/codecov-yaml
#
# Per-package coverage floors enforced locally in `vitest.config.ts`
# (kernel 80/70/80/80, types 80, etc.) — those are the engineer-owned
# floors that gate test runs even before upload. Codecov's role here
# is the PR-side delta gate: surface coverage changes per PR, fail
# the project gate if total coverage drops more than the tolerance.

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: '70...90'

  status:
    project:
      default:
        # Project-level: total coverage of the repo. Allow a small drop
        # to absorb refactors that move tests, but flag anything bigger.
        target: auto
        threshold: 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        # Patch-level: coverage of lines changed/added by the PR itself.
        # New code must be 80% covered to merge.
        target: 80%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true

# Per-package flags. Lets us see coverage broken down per workspace package
# in the PR comment instead of one rolled-up number.
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 1%
  individual_flags:
    - name: types
      paths:
        - packages/types/
    - name: kernel
      paths:
        - packages/kernel/
    - name: compiler
      paths:
        - packages/compiler/
    - name: cli
      paths:
        - packages/cli/

# Codecov components — semantic groupings used for status checks and PR
# comment breakdown. Components are the newer alternative to flags for
# monorepo grouping; we keep both because flags are needed for per-package
# carryforward in the lcov upload while components give clean status checks.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
  individual_components:
    - component_id: kernel
      name: Kernel (deterministic state)
      paths:
        - packages/kernel/**
    - component_id: compiler
      name: Compiler (Claude passes + agents)
      paths:
        - packages/compiler/**
    - component_id: cli
      name: CLI (operator surface)
      paths:
        - packages/cli/**
    - component_id: types
      name: Shared types + schemas
      paths:
        - packages/types/**

comment:
  layout: 'header, diff, flags, components, files, footer'
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: true

ignore:
  - '**/*.test.ts'
  - '**/*.d.ts'
  - '**/dist/**'
  - '**/node_modules/**'
  - 'evals/**'
  - 'tests/integration/fixtures/**'
  - 'plugin/skills/**/scripts/**'
  - 'packages/benchmarks/**'
