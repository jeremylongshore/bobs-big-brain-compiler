name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # OSV Scanner replaces `pnpm audit`, which stopped working on 2026-04-15
    # when npm retired https://registry.npmjs.org/-/npm/v1/security/audits
    # (HTTP 410). OSV.dev is Google-run, free, and reads pnpm-lock.yaml
    # directly — no repo-level settings or third-party endpoints.
    # Fails on HIGH/CRITICAL vulnerabilities.
    steps:
      - uses: actions/checkout@v6

      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --lockfile=./pnpm-lock.yaml
            --fail-on-vuln
            --min-severity=HIGH

      - name: Check for committed .env files
        if: always()
        run: |
          leaked_files=$(find . -path '*/node_modules' -prune -o -name '.env*' -print | grep -v '.env.example$' || true)
          if [ -n "$leaked_files" ]; then
            echo "ERROR: Found committed .env files. Never commit secrets."
            echo "$leaked_files"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm format:check

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    # pull-requests: write lets gitleaks-action post a PR comment annotating
    # any findings. Without it the comment silently fails but the job still
    # exits non-zero on a hit — annotation is the main reason to use
    # gitleaks-action over the bare gitleaks binary, so we grant it.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  harness-verify:
    name: Audit Harness Verify
    runs-on: ubuntu-latest
    # Verifies the SHA-256 hash manifest pinning policy artifacts
    # (tests/TESTING.md, features/*.feature, .dependency-cruiser.cjs).
    # Exit 3 (no manifest) is tolerated until the manifest is initialized
    # by the engineer via `scripts/audit-harness init`.
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify hash manifest
        run: |
          scripts/audit-harness verify || rc=$?
          if [ "${rc:-0}" = "3" ]; then
            echo "::warning::No hash manifest present. Run: scripts/audit-harness init"
            exit 0
          fi
          exit "${rc:-0}"

  plugin-scripts:
    name: Plugin Script Tests
    runs-on: ubuntu-latest
    # Runs the script-test suite for plugin/skills/ico-your-internals/.
    # 15 bash assertions + 6 Python unittest tests covering the
    # citation-verify logic, budget estimator, and Gemini PR #77 fixes
    # (E2BIG handling, PRUNE_PARTS, snippet centering).
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        # PyYAML is needed by run.sh's bank-validation step. Pinned to a
        # known-good version; bump only when verify.py / render-summary.py
        # also bump.
        run: pip install pyyaml==6.0.2
      - name: Run script tests
        run: plugin/skills/ico-your-internals/scripts/tests/run-all.sh

  arch-check:
    name: Architecture Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Dependency-cruiser
        run: pnpm arch:check

  cli-smoke:
    name: CLI Smoke (artifact)
    runs-on: ubuntu-latest
    # Post-build smoke against the actual built binary — catches issues that
    # vitest can't see (missing files in dist/, shebang, exports map).
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: CLI smoke
        run: |
          set -e
          node packages/cli/dist/index.js --version
          node packages/cli/dist/index.js --help > /dev/null
          tmp=$(mktemp -d)
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" init smoke-test --path "$tmp"
          test -d "$tmp/smoke-test/.ico" || {
            echo "::error::ico init did not create $tmp/smoke-test/.ico"
            ls -la "$tmp/smoke-test" || true
            exit 1
          }

  audit-chain-verify:
    name: Audit chain verify (ico audit verify)
    runs-on: ubuntu-latest
    # Post-test gate per CISO seat §2.5(1) of 035-AT-DECR + bead zcc.1.
    # Builds the CLI, runs commands that emit audit-trail events, and
    # walks the resulting SHA-256 chain to confirm no in-file tampering.
    # Exit 2 from `ico audit verify` means AUDIT_TAMPERED — gate fails.
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Positive case — fresh workspace, emit traces, verify exit 0
        run: |
          set -e
          tmp=$(mktemp -d)
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" init audit-positive --path "$tmp"
          ws="$tmp/audit-positive"
          # Seed a stub wiki page so `ico spool emit` has something to do.
          # Each spool emit writes 2 trace events (start + complete) via
          # the kernel's writeTrace path. No Claude compile required.
          mkdir -p "$ws/wiki/topics"
          cat > "$ws/wiki/topics/stub.md" <<'STUB'
          ---
          type: topic
          title: Stub for audit-chain CI smoke
          id: 00000000-0000-4000-8000-000000000001
          compiled_at: 2026-05-24T00:00:00.000Z
          model: stub
          ---

          Body content for the audit-verify smoke test.
          STUB
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" --workspace "$ws" spool emit --tenant ci-smoke
          # `ico audit verify` exit 0 = chain intact; exit 2 = tampered.
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" --workspace "$ws" audit verify
      - name: Tamper-detection case — mutate JSONL, expect exit 2
        run: |
          set -e
          tmp=$(mktemp -d)
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" init audit-tamper --path "$tmp"
          ws="$tmp/audit-tamper"
          mkdir -p "$ws/wiki/topics"
          cat > "$ws/wiki/topics/stub.md" <<'STUB'
          ---
          type: topic
          title: Stub for audit-tamper CI smoke
          id: 00000000-0000-4000-8000-000000000002
          compiled_at: 2026-05-24T00:00:00.000Z
          model: stub
          ---

          Body content.
          STUB
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" --workspace "$ws" spool emit --tenant ci-smoke
          file=$(find "$ws/audit/traces" -name '*.jsonl' | head -1)
          test -n "$file" || { echo "::error::no trace file produced"; exit 1; }
          # Mutate line 0 by replacing the first byte of its event_id UUID.
          # Line 1's prev_hash was computed against the original line 0 bytes,
          # so the recomputed SHA-256 of the tampered line 0 no longer matches
          # — verifyAuditChain reports a break on line 1.
          sed -i '1s/"event_id":"./"event_id":"X/' "$file"
          set +e
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" --workspace "$ws" audit verify
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            echo "::error::expected exit 2 (AUDIT_TAMPERED), got $rc"
            exit 1
          fi
          echo "✓ Tamper detection works: ico audit verify correctly exited 2"
