name: Mutation Testing

# L3 mutation-survival measurement via Stryker. Targets kernel + compiler
# (highest-value modules) per stryker.config.json. Decoupled from the PR
# critical path because mutation runs are slow — runs nightly + on-demand.
# Once a baseline mutation score is recorded in tests/TESTING.md, wire the
# `mutation` job here into the required-checks set.

on:
  workflow_dispatch:
  schedule:
    # Nightly at 04:00 UTC.
    - cron: '0 4 * * *'

permissions:
  contents: read

jobs:
  stryker:
    name: Stryker (kernel + compiler)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Stryker run
        run: pnpm mutation
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
