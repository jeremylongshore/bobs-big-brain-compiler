# Tag-triggered publish — the second half of the PR-gated release flow.
#
# Release flow (industry-standard, protected-main-safe):
#   1. Open a version-bump + CHANGELOG PR → it passes CodeQL like any change.
#   2. Merge it (normal protected-branch flow — no push to protected main from CI).
#   3. Push the `vX.Y.Z` tag → THIS workflow builds, publishes to npm, and
#      creates the GitHub release.
#
# Tags are not branch-protected, so this side has none of the push-to-main
# problems that broke the old on-main-push auto-release. Every step is
# idempotent, so re-running a tag (or a tag whose npm/GH release already exists)
# is safe.
name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub release

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish (npm + GitHub release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Publish to npm (idempotent)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          VERSION_NUM="${GITHUB_REF_NAME#v}"

          if [ -z "$NPM_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret not configured — skipping npm publish."
            exit 0
          fi

          # Don't republish a version already on npm (manual publish, or a
          # re-run of this tag) — npm 403s on republish. Treat as success.
          PUBLISHED=$(npm view intentional-cognition-os@"$VERSION_NUM" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION_NUM" ]; then
            echo "::notice::intentional-cognition-os@$VERSION_NUM already on npm — skipping."
            exit 0
          fi

          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          pnpm --filter intentional-cognition-os publish \
            --no-git-checks \
            --access public \
            --tag latest

          # Poll for registry propagation (occasionally >60s) rather than a
          # fixed sleep, so a slow-but-successful publish isn't a false failure.
          for i in $(seq 1 24); do
            SEEN=$(npm view intentional-cognition-os@"$VERSION_NUM" version 2>/dev/null || true)
            if [ "$SEEN" = "$VERSION_NUM" ]; then
              echo "::notice::intentional-cognition-os@$VERSION_NUM is live on npm."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Published but not yet visible via npm view after 120s (propagation lag)."

      - name: Create GitHub release from the CHANGELOG (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"

          # Already released (e.g. cut manually alongside the tag)? Do nothing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::GitHub release $TAG already exists — skipping."
            exit 0
          fi

          # Extract this version's CHANGELOG section for the release notes.
          # Matches '## [vX.Y.Z]' or '## [X.Y.Z]'; stops at the next '## ['.
          VER_NO_V="${TAG#v}"
          NOTES=$(awk -v v="$VER_NO_V" '
            $0 ~ ("^## \\[v?" v "\\]") { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md)
          [ -n "$NOTES" ] || NOTES="Release $TAG"

          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "intentional-cognition-os $TAG" \
            --notes-file /tmp/release-notes.md \
            --latest \
            --verify-tag
          echo "::notice::Created GitHub release $TAG."
