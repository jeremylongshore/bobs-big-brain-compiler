# Question bank: intent-eval-core v1
#
# Hand-authored Q/A against ~/000-projects/intent-eval-platform/intent-eval-core/.
# Every question has expected_substrings verified to be present in the source
# at authoring time (2026-05-21). If any expected_substring is missing from
# ICO's answer or its cited source, the verify pipeline flags it for review.
#
# Strong-signal questions probe the kernel-only role separation that defines
# intent-eval-core within the 5-repo Intent Eval Platform ecosystem. The
# expected_sources reference the Document Filing Standard v4.3 names so the
# verify pipeline can resolve them deterministically.
#
# Bumping a question's content is a breaking change to the bank — bump
# `version` and rev the filename (intent-eval-core-v2.yaml) so prior runs'
# verify-rates remain comparable against the v1 bank specifically.

version: v1
target: intent-eval-core
target_path_hint: ~/000-projects/intent-eval-platform/intent-eval-core
authored: 2026-05-21
author: Jeremy Longshore

questions:
  - id: Q01
    question: |
      What is intent-eval-core's role inside the Intent Eval Platform, and what does it explicitly not do?
    expected_substrings:
      - 'kernel'
      - 'contracts'
      - 'no runtime'
    expected_sources:
      - CLAUDE.md
      - 000-docs/002-AT-ARCH-repo-blueprint-2026-05-18.md
      - 000-docs/003-AT-STND-core-repo-boundaries-2026-05-18.md
    verification_mode: strong
    notes: |
      Probes the foundational role boundary — kernel-only, contracts only,
      no execution. This is the load-bearing claim ICO has to get right
      for any other intent-eval-core question to mean anything. The role
      separation is documented in both CLAUDE.md and the per-repo
      blueprint, with the boundary doctrine (003-AT-STND) as the
      enforcement spec.

  - id: Q02
    question: |
      How many canonical platform entities does intent-eval-core define?
    expected_substrings:
      - '13'
    expected_sources:
      - CLAUDE.md
      - README.md
    verification_mode: strong
    notes: |
      Surface-level fact check. The number 13 appears in both CLAUDE.md
      ("13 canonical platform entities") and README.md ("13 canonical
      platform entities"). If ICO hallucinates a different count this
      is a clear citation regression.

  - id: Q03
    question: |
      Which document carries the NORMATIVE gate-result/v1 predicate contract, and which section is it in?
    expected_substrings:
      - 'Blueprint B'
      - '§ 7'
    expected_sources:
      - CLAUDE.md
      - 000-docs/002-AT-ARCH-repo-blueprint-2026-05-18.md
    verification_mode: strong
    notes: |
      Cross-doc synthesis. CLAUDE.md cites Blueprint B at
      012-AT-ARCH-platform-runtime-blueprint.md as the NORMATIVE source
      for the gate-result/v1 predicate spec at § 7. The per-repo
      blueprint (002-AT-ARCH) inherits from this — citing the lab's
      Blueprint B via the inherits_from frontmatter. Tests whether ICO
      can follow the inherits-from chain to the right source.

  - id: Q04
    question: |
      What license is intent-eval-core published under, and why was that choice made?
    expected_substrings:
      - 'Apache'
      - '2.0'
      - 'downstream'
    expected_sources:
      - README.md
      - LICENSE
    verification_mode: strong
    notes: |
      Tests both surface fact (Apache 2.0) and the why (README's
      explicit justification: "The kernel is permissively licensed so
      every downstream consumer (commercial, OSS, internal) can depend
      on it without friction"). If ICO gets the license wrong or
      omits the downstream-consumer rationale, that's a real miss.

  - id: Q05
    question: |
      What is the source-of-truth hierarchy intent-eval-core's CLAUDE.md prescribes when sources disagree, listed from highest to lowest authority?
    expected_substrings:
      - 'bd'
      - 'DR-010'
      - 'Blueprint A'
    expected_sources:
      - CLAUDE.md
    verification_mode: strong
    notes: |
      Deepest question in the bank — probes ICO's ability to articulate
      a 7-tier ordered hierarchy from a table inside CLAUDE.md. Strong
      signal because the answer is structurally constrained: get the
      first three tiers right (bd → DR-010 → Blueprint A) and ICO has
      the spine of the answer. Missing any of those three is a clear
      regression. CLAUDE.md is the only document containing the table
      so this also tests citation precision (single-source answer).
